<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&amp;display=swap');
      .go { font-family: 'Poppins', system-ui, sans-serif; font-weight: 800; font-size: 110px; fill: #0047AB; }
      .happy { font-family: 'Poppins', system-ui, sans-serif; font-weight: 700; font-size: 100px; fill: #00CED1; }
      .bg { fill: #ffffff; }
    </style>
  </defs>
  
  <rect class="bg" width="100%" height="100%" rx="40" />

  <!-- "Go" Top Line -->
  <text x="200" y="110" text-anchor="middle" class="go" letter-spacing="-2">
    G<tspan letter-spacing="0">o</tspan>
  </text>
  
  <!-- Winking eye inside the 'o' (approximate position) -->
  <g transform="translate(239, 65)">
      <!-- Left eye closed (wink) -->
      <path d="M -12 0 Q -6 -6 0 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <!-- Right eye open -->
      <path d="M 12 0 Q 18 -6 24 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- "Happy" Bottom Line -->
  <text x="200" y="210" text-anchor="middle" class="happy" letter-spacing="-1">
    H<tspan letter-spacing="-4">a</tspan>ppy
  </text>
  
  <!-- Smile under 'a' -->
  <path d="M 130 220 Q 145 235 165 220" fill="none" stroke="#00CED1" stroke-width="6" stroke-linecap="round"/>
</svg>
